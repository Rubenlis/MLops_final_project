name: Dev to Staging (CI/CD)

on:
  push:
    branches:
      - staging

jobs:
  train-evaluate-promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest mlflow dagshub dvc[gdrive] # Added mlflow/dvc/dagshub here

      # 1. FETCH DATA VIA DVC (Requirement #6)
      - name: Fetch real data with DVC
        run: |
          dvc pull
        env:
          DVC_REMOTE_TOKEN: ${{ secrets.DVC_REMOTE_TOKEN }}

      - name: Run unit tests
        run: |
          pytest tests/

      - name: Train on a larger subset
        run: |
          python src/qa/train.py \
            --train_json data/train-v2.0.json \
            --val_json data/dev-v2.0.json \
            --epochs 3 \
            --batch_size 16 \
            --subset_train 2000 \
            --subset_val 500
        env:
          # Credentials needed so train.py can log to MLflow
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

      - name: Quality Gate (F1 Threshold) & MLflow Staging Promotion
        env:
          F1_THRESHOLD: 0.60
          MODEL_NAME: "qa_model"
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          python -c "
          import json
          import os
          import mlflow
          from mlflow.tracking import MlflowClient

          # Connect to DagsHub/MLflow
          mlflow.set_tracking_uri(os.environ['MLFLOW_TRACKING_URI'])
          
          threshold = float(os.environ['F1_THRESHOLD'])
          model_name = os.environ['MODEL_NAME']

          metrics_path = 'artifacts/metrics.json'
          if not os.path.exists(metrics_path):
              print('Metrics file not found.')
              exit(1)

          with open(metrics_path, 'r') as f:
              metrics = json.load(f)

          best_f1 = metrics.get('best_val_f1', 0.0)
          print(f'Obtained F1 Score: {best_f1:.4f}')

          if best_f1 >= threshold:
              print('Quality Gate passed! Promoting model to Staging...')
              client = MlflowClient()
              # Transition the latest 'None' version to 'Staging'
              versions = client.get_latest_versions(model_name, stages=['None'])
              if versions:
                  latest_version = versions[0].version
                  client.transition_model_version_stage(
                      name=model_name,
                      version=latest_version,
                      stage='Staging',
                      archive_existing_versions=True
                  )
                  print(f'Model promoted to Staging (Version {latest_version})!')
              else:
                  print('No model version found.')
          else:
              print(f'Quality Gate failed: {best_f1} < {threshold}')
              exit(1)
          "