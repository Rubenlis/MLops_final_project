name: Dev to Staging (CI/CD)

on:
  pull_request:
    branches:
      - staging
    types: [closed]

jobs:
  train-evaluate-promote:
    # run ONLY when the PR was actually merged (not just closed)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout merged code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use merge commit when available; fallback to staging head
          ref: ${{ github.event.pull_request.merge_commit_sha || 'staging' }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pytest mlflow dagshub "dvc[http]" scikit-learn

      # --- DVC (DagsHub) ---
      - name: Configure DVC auth for DagsHub (runtime)
        env:
          DAGSHUB_USER: ${{ secrets.DAGSHUB_USER }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          mkdir -p ~/.config/dvc
          cat > ~/.config/dvc/config << EOF
          ['remote "dagshub"']
              user = ${DAGSHUB_USER}
              password = ${DAGSHUB_TOKEN}
          EOF

      - name: DVC pull (DagsHub)
        run: |
          # relies on .dvc/config having:
          # [core] remote = dagshub
          # ['remote "dagshub"'] url = https://dagshub.com/Rubenlis/MLops_final_project.dvc
          dvc pull -v

      - name: Run unit tests
        run: |
          python -m pytest -q

      - name: Train on staging subset
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          python training/train.py \
            --train_json data/train-v2.0.json \
            --val_json data/dev-v2.0.json \
            --epochs 3 \
            --batch_size 16 \
            --subset_train 20000 \
            --subset_val 4000

      - name: Quality Gate & Promote model to Staging (with tags)
        env:
          F1_THRESHOLD: "0.10"
          MODEL_NAME: "qa_model"
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
          GIT_SHA: ${{ github.sha }}
          GIT_REF: ${{ github.ref }}
        run: |
          python - << 'PY'
          import json, os, sys
          from datetime import datetime, timezone
          import mlflow
          from mlflow.tracking import MlflowClient

          mlflow.set_tracking_uri(os.environ["MLFLOW_TRACKING_URI"])
          client = MlflowClient()

          threshold = float(os.environ["F1_THRESHOLD"])
          model_name = os.environ["MODEL_NAME"]

          metrics_path = "artifacts/metrics.json"
          if not os.path.exists(metrics_path):
              print("Metrics file not found:", metrics_path)
              sys.exit(1)

          with open(metrics_path, "r", encoding="utf-8") as f:
              metrics = json.load(f)

          best_f1 = float(metrics.get("best_val_f1", 0.0))
          print(f"Obtained F1 Score: {best_f1:.4f}")

          if best_f1 < threshold:
              print(f"Quality Gate failed: {best_f1:.4f} < {threshold:.2f}")
              sys.exit(1)

          # Promote latest NONE stage version (newly registered)
          versions = client.get_latest_versions(model_name, stages=["None"])
          if versions:
              mv = versions[0]
          else:
              all_versions = client.search_model_versions(f"name='{model_name}'")
              if not all_versions:
                  print("No model versions found.")
                  sys.exit(1)
              mv = max(all_versions, key=lambda v: int(v.version))

          version = mv.version
          run_id = mv.run_id

          client.transition_model_version_stage(
              name=model_name,
              version=version,
              stage="Staging",
              archive_existing_versions=True
          )

          now = datetime.now(timezone.utc).isoformat()
          client.set_model_version_tag(model_name, version, "promoted_to", "staging")
          client.set_model_version_tag(model_name, version, "quality_gate_f1", f"{best_f1:.4f}")
          client.set_model_version_tag(model_name, version, "promoted_by", "github-actions")
          client.set_model_version_tag(model_name, version, "git_sha", os.environ.get("GIT_SHA", ""))
          client.set_model_version_tag(model_name, version, "git_ref", os.environ.get("GIT_REF", ""))
          client.set_model_version_tag(model_name, version, "promoted_at_utc", now)

          if run_id:
              client.set_tag(run_id, "promoted_to", "staging")
              client.set_tag(run_id, "quality_gate_f1", f"{best_f1:.4f}")
              client.set_tag(run_id, "git_sha", os.environ.get("GIT_SHA", ""))
              client.set_tag(run_id, "git_ref", os.environ.get("GIT_REF", ""))

          print(f"✅ Model promoted to Staging: {model_name} v{version}")
          PY
