<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLOps QA App</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        textarea, input { width: 100%; margin-bottom: 15px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;}
        button { background-color: #007bff; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold;}
        button:hover { background-color: #0056b3; }
        .result { margin-top: 20px; padding: 15px; background-color: #e9ecef; border-radius: 4px; min-height: 50px;}
    </style>
</head>
<body>
    <div class="container">
        <h2>AI Question/Answering System </h2>
        
        <label><strong>Context (The text the AI should read):</strong></label>
        <textarea id="context" rows="6" placeholder="Paste the text context here..."></textarea>
        
        <label><strong>Your Question:</strong></label>
        <input type="text" id="question" placeholder="What do you want to know?">
        
        <button onclick="askAI()" id="btn">Ask Question</button>
        
        <div class="result">
            <strong>Answer:</strong> <span id="answer">...</span>
        </div>
    </div>

    <script>
        async function askAI() {
            const context = document.getElementById("context").value;
            const question = document.getElementById("question").value;
            const answerSpan = document.getElementById("answer");
            const btn = document.getElementById("btn");

            // Basic validation
            if (!context || !question) {
                alert("Both context and question are required!");
                return;
            }

            // Update UI while waiting
            answerSpan.innerText = "AI is thinking...";
            btn.disabled = true;

            try {
                // Direct call to our FastAPI Python backend
                const response = await fetch("/predict", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ context: context, question: question })
                });

                const data = await response.json();
                
                // Display the answer or the error
                if (response.ok) {
                    answerSpan.innerText = data.answer;
                } else {
                    answerSpan.innerText = "Error: " + data.detail;
                }
            } catch (error) {
                answerSpan.innerText = "Server connection error.";
            } finally {
                // Re-enable the button
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
